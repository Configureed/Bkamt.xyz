<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVP Loader</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <img src="../assets/logo.png" alt="AVP Logo" class="modal-logo">
                <h2>AVP Loader</h2>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="user here:" value="root" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="password here:" value="rootkit" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <div class="modal-footer">
                <p>Enter your credentials to access the loader</p>
            </div>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-logo">
                    <img src="../assets/logo.png" alt="AVP Logo" class="tz-logo-sidebar">
                </div>
                <div class="nav-icons">
                    <div class="nav-icon active">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div class="nav-icon">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="nav-icon">
                    <i class="fas fa-cog"></i>
                </div>
            </div>
        </div>

        <!-- Right Side Content -->
        <div class="right-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-bar-content">
                    <h1 class="welcome-text">Welcome back</h1>
                    <div class="profile-avatar">
                        <img src="../assets/profile.jpg" alt="Profile" class="avatar-img">
                    </div>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="main-content">
                <!-- Apps Tab Content -->
                <div class="tab-content active" id="apps-tab">
                    <div class="apps-container">
                        <div class="apps-grid">
                            <div class="app-card">
                                <div class="app-icon">
                                    <img src="../assets/logo.png" alt="AVP" class="app-logo">
                                </div>
                                <h3 class="app-name">AVP</h3>
                                <p class="app-description">Internal Client</p>
                                <button class="launch-btn" onclick="launchApp('AVP')">
                                    <i class="fas fa-play"></i> Launch
                                </button>
                            </div>
                            
                            <div class="app-card">
                                <div class="app-icon">
                                    <img src="../assets/logo.png" alt="AVPX" class="app-logo">
                                </div>
                                <h3 class="app-name">AVPX</h3>
                                <p class="app-description">External Client</p>
                                <button class="launch-btn" onclick="launchApp('AVPX')">
                                    <i class="fas fa-play"></i> Launch
                                </button>
                            </div>
                            
                            <div class="app-card app-card-full">
                                <div class="app-icon">
                                    <img src="../assets/logo.png" alt="Spoofer Driver" class="app-logo">
                                </div>
                                <h3 class="app-name">Spoofer Driver</h3>
                                <button class="launch-btn" onclick="launchApp('Spoofer Driver')">
                                    <i class="fas fa-play"></i> Launch
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Settings Tab Content -->
                <div class="tab-content" id="settings-tab">
                    <div class="settings-container">
                        <div class="settings-section">
                            <h3 class="section-title"><i class="fas fa-cog"></i> General Settings</h3>
                            <div class="setting-item">
                                <label class="setting-label"><i class="fas fa-play-circle"></i> Auto-start with Windows</label>
                                <input type="checkbox" class="setting-checkbox" id="autostart">
                            </div>
                            <div class="setting-item">
                                <label class="setting-label"><i class="fas fa-window-minimize"></i> Minimize to tray</label>
                                <input type="checkbox" class="setting-checkbox" id="minimize-tray">
                            </div>
                            <div class="setting-item">
                                <label class="setting-label"><i class="fas fa-bell"></i> Enable notifications</label>
                                <input type="checkbox" class="setting-checkbox" id="notifications" checked>
                            </div>
                        </div>
                        
                        <div class="settings-section">
                            <h3 class="section-title"><i class="fas fa-palette"></i> Appearance</h3>
                            <div class="setting-item">
                                <label class="setting-label"><i class="fas fa-adjust"></i> Theme</label>
                                <select class="setting-select" id="theme">
                                    <option value="dark">Dark</option>
                                    <option value="light">Light</option>
                                </select>
                            </div>
                            <div class="setting-item">
                                <label class="setting-label"><i class="fas fa-language"></i> Language</label>
                                <select class="setting-select" id="language">
                                    <option value="en">English</option>
                                    <option value="es">Spanish</option>
                                    <option value="fr">French</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Profile Tab Content -->
                <div class="tab-content" id="profile-tab">
                    <div class="profile-container">
                        <div class="profile-header">
                            <div class="profile-avatar-large">
                                <img src="../assets/profile.jpg" alt="Profile" class="profile-img-large">
                            </div>
                            <div class="profile-info">
                                <h2 class="profile-name" id="profileName">root</h2>
                                <p class="profile-email" id="profileEmail">root@avploader.com</p>
                                <p class="profile-status">Premium Member</p>
                            </div>
                        </div>
                        
                        <div class="profile-stats">
                            <div class="stat-item">
                                <span class="stat-label">Apps Launched</span>
                                <span class="stat-value">42</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Session Time</span>
                                <span class="stat-value">2h 15m</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Last Login</span>
                                <span class="stat-value">Today</span>
                            </div>
                        </div>
                        
                        <div class="profile-actions">
                            <button class="profile-btn"><i class="fas fa-edit"></i> Edit Profile</button>
                            <button class="profile-btn"><i class="fas fa-key"></i> Change Password</button>
                            <button class="profile-btn logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/main.js"></script>
</body>
</html>
